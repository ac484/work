<div class="sidebar-panelmenu">
  <div class="sidebar-header flex items-center gap-2 mb-4 p-4">
    <i class="pi pi-verified text-primary text-2xl"></i>
    <span class="font-bold text-lg text-primary">工作區</span>
  </div>
  <p-panelmenu [model]="items" [style]="{ 'minWidth': '180px', 'width': '180px' }" class="sidebar-menu" />
  <div class="sidebar-avatar flex flex-col items-center mt-8 mb-4">
    <img [src]="avatarUrl" alt="avatar" class="rounded-full" style="width: 40px; height: 40px" />
    <span class="text-xs text-surface-500 mt-2">{{ userName }}</span>
  </div>
  <div class="sidebar-darkmode flex flex-col items-center mb-2">
    <button type="button"
      pButton
      class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-100 dark:hover:bg-surface-800 transition-all text-surface-900 dark:text-surface-0"
      (click)="toggleDarkMode()"
      [attr.aria-label]="isDarkMode() ? '切換為淺色模式' : '切換為深色模式'">
      <i class="pi text-base" [ngClass]="{ 'pi-moon': isDarkMode(), 'pi-sun': !isDarkMode() }"></i>
    </button>
  </div>
  <div class="sidebar-auth flex flex-col items-center mb-4">
    <app-google-auth-button
      [isLoggedIn]="isLoggedIn"
      [userName]="userName"
      [loading]="loading"
      (login)="onLogin()"
      (logout)="onLogout()"
    ></app-google-auth-button>
  </div>
</div>
