<p-splitter [layout]="'vertical'" [panelSizes]="[20,20,20,20,20]" style="height: 100vh;">
  <ng-template #panel>
    <p-splitter [panelSizes]="[15,20,30,20,15]">
      <ng-template #panel><div class="cell">左1</div></ng-template>
      <ng-template #panel><div class="cell">左2-1</div></ng-template>
      <ng-template #panel><div class="cell">中</div></ng-template>
      <ng-template #panel><div class="cell">右1-1</div></ng-template>
      <ng-template #panel><div class="cell">右2-1</div></ng-template>
    </p-splitter>
  </ng-template>
  <ng-template #panel>
    <p-splitter [panelSizes]="[15,20,30,20,15]">
      <ng-template #panel><div class="cell">左1-1</div></ng-template>
      <ng-template #panel><div class="cell">左2-2</div></ng-template>
      <ng-template #panel><div class="cell">中</div></ng-template>
      <ng-template #panel><div class="cell">右1-2</div></ng-template>
      <ng-template #panel><div class="cell">右2-2</div></ng-template>
    </p-splitter>
  </ng-template>
  <ng-template #panel>
    <p-splitter [panelSizes]="[15,20,30,20,15]">
      <ng-template #panel><div class="cell">左1-2</div></ng-template>
      <ng-template #panel><div class="cell">左2-3中</div></ng-template>
      <ng-template #panel><div class="cell">中</div></ng-template>
      <ng-template #panel><div class="cell">右1-3</div></ng-template>
      <ng-template #panel><div class="cell">右2-3</div></ng-template>
    </p-splitter>
  </ng-template>
  <ng-template #panel>
    <p-splitter [panelSizes]="[15,20,30,20,15]">
      <ng-template #panel><div class="cell">左1-3</div></ng-template>
      <ng-template #panel><div class="cell">左2-4</div></ng-template>
      <ng-template #panel><div class="cell">中</div></ng-template>
      <ng-template #panel><div class="cell">右1-4</div></ng-template>
      <ng-template #panel><div class="cell">右2-4</div></ng-template>
    </p-splitter>
  </ng-template>
  <ng-template #panel>
    <p-splitter [panelSizes]="[15,20,30,20,15]">
      <ng-template #panel><div class="cell">左1-4</div></ng-template>
      <ng-template #panel><div class="cell">左2-5</div></ng-template>
      <ng-template #panel><div class="cell">中</div></ng-template>
      <ng-template #panel><div class="cell">右1-5</div></ng-template>
      <ng-template #panel><div class="cell">右2-5</div></ng-template>
    </p-splitter>
  </ng-template>
</p-splitter>
