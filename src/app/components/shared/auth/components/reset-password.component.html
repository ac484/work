<form (ngSubmit)="reset()" class="p-fluid">
  <div class="p-field">
    <label for="email">Email</label>
    <input
      pInputText
      [(ngModel)]="email"
      name="email"
      type="email"
      placeholder="Email"
      required
    />
  </div>
  <button pButton type="submit" label="重設密碼"></button>
  <p-message *ngIf="message" severity="success" [text]="message"></p-message>
  <p-message *ngIf="error" severity="error" [text]="error"></p-message>
</form>
